<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aliveville 3D</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#07111d" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #07111d;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
      }

      /* Inline splash — visible before any JS parses */
      #splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: radial-gradient(ellipse at 50% 35%, #1b2335 0%, #0c111d 70%);
        color: #f1f5fb;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        font-size: 15px;
        letter-spacing: 0.04em;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #splash.splash-hide {
        opacity: 0;
        pointer-events: none;
      }

      #splash-wordmark {
        font-family: "Cinzel", "Avenir Next", serif;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        color: #f1ead7;
        text-shadow: 0 0 28px rgba(248, 212, 78, 0.35), 0 0 48px rgba(127, 208, 255, 0.3);
        animation: splash-pulse 1.8s ease-in-out infinite;
      }

      @keyframes splash-pulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Pre-JS splash: removed by React once the app mounts -->
    <div id="splash">
      <div id="splash-wordmark">ALIVEVILLE</div>
      <div id="splash-status">loading…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
